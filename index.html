<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b1520" id="meta-theme" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="UrbanMap" />
  <title>UrbanMap — Fiscalize sua Cidade</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Map canvas -->
  <div id="map"></div>

  <!-- Header -->
  <header id="header">
    <h1>Urban<span>Map</span></h1>
    <div id="status-pill">
      <div id="status-dot"></div>
      <span id="status-text">Localizando…</span>
    </div>
  </header>

  <!-- Counter -->
  <div id="counter"><strong id="marker-count">0</strong> ocorrências</div>

  <!-- Theme toggle -->
  <button id="theme-btn" title="Alternar tema" aria-label="Alternar tema claro/escuro">🌙</button>

  <!-- Legend -->
  <div id="legend" aria-label="Legenda de categorias">
    <div class="leg-item"><div class="leg-dot" style="background:var(--c-buraco)"></div>Buraco</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--c-desnivel)"></div>Desnível</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--c-ilum)"></div>Iluminação</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--c-rampa)"></div>Rampa</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--c-obs)"></div>Obstrução</div>
  </div>

  <!-- Locate button -->
  <button id="locate-btn" title="Centralizar minha localização" aria-label="Centralizar localização">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/>
      <line x1="12" y1="2" x2="12" y2="6"/>
      <line x1="12" y1="18" x2="12" y2="22"/>
      <line x1="2" y1="12" x2="6" y2="12"/>
      <line x1="18" y1="12" x2="22" y2="12"/>
    </svg>
  </button>

  <!-- FAB -->
  <button id="fab" title="Registrar ocorrência" aria-label="Registrar nova ocorrência">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--accent-fg)" stroke-width="2.5" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/>
      <line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <!-- Overlay -->
  <div id="overlay" role="presentation"></div>

  <!-- ── BOTTOM SHEET ── -->
  <div id="sheet" role="dialog" aria-modal="true" aria-label="Nova ocorrência">
    <div class="sheet-handle" aria-hidden="true"></div>
    <h2>Nova ocorrência</h2>
    <p class="subtitle">Selecione o tipo de problema, tire ou escolha uma foto e registre</p>

    <!-- Categories -->
    <div class="cat-grid" role="radiogroup" aria-label="Tipo de ocorrência">
      <button class="cat-btn" data-cat="buraco" role="radio" aria-checked="false">
        <span class="icon" aria-hidden="true">🕳️</span>
        <span class="label">Buraco</span>
        <span class="desc">Cratera ou buraco na via</span>
      </button>
      <button class="cat-btn" data-cat="desnivel" role="radio" aria-checked="false">
        <span class="icon" aria-hidden="true">⚠️</span>
        <span class="label">Desnível</span>
        <span class="desc">Irregularidade no piso</span>
      </button>
      <button class="cat-btn" data-cat="ilum" role="radio" aria-checked="false">
        <span class="icon" aria-hidden="true">💡</span>
        <span class="label">Falta de Iluminação</span>
        <span class="desc">Poste apagado ou ausente</span>
      </button>
      <button class="cat-btn" data-cat="rampa" role="radio" aria-checked="false">
        <span class="icon" aria-hidden="true">♿</span>
        <span class="label">Rampa de Acesso</span>
        <span class="desc">Rampa danificada ou ausente</span>
      </button>
      <button class="cat-btn" data-cat="obs" role="radio" aria-checked="false">
        <span class="icon" aria-hidden="true">🚧</span>
        <span class="label">Obstrução</span>
        <span class="desc">Via ou calçada bloqueada</span>
      </button>
    </div>

    <!-- Image upload – obrigatório -->
    <div class="upload-section">
      <label class="upload-label">
        Foto do problema
        <span class="required-badge">obrigatório</span>
      </label>

      <!-- Source buttons: camera + gallery -->
      <div class="img-source-row" id="img-source-row">
        <button class="img-src-btn" id="btn-camera" type="button" aria-label="Abrir câmera">
          <span class="btn-icon" aria-hidden="true">📷</span>
          <span>Câmera</span>
          <span class="btn-sub">Tirar foto agora</span>
        </button>
        <button class="img-src-btn" id="btn-gallery" type="button" aria-label="Escolher da galeria">
          <span class="btn-icon" aria-hidden="true">🖼️</span>
          <span>Galeria</span>
          <span class="btn-sub">Escolher imagem</span>
        </button>
      </div>

      <!-- Preview after selection -->
      <div id="img-preview-wrap">
        <img id="img-preview" src="" alt="Prévia da foto selecionada" />
        <button id="img-remove" type="button" aria-label="Remover foto">✕</button>
      </div>

      <!-- Validation hint -->
      <div id="img-required-hint" role="alert">⚠ Adicione uma foto para continuar</div>

      <!-- Hidden inputs -->
      <input type="file" id="img-input-camera"  accept="image/*" capture="environment" />
      <input type="file" id="img-input-gallery" accept="image/*" />
    </div>

    <button id="confirm-btn" disabled type="button">Registrar ocorrência</button>
  </div>

  <!-- Toast -->
  <div id="toast" role="status" aria-live="polite"></div>

  <!-- ── LIGHTBOX ── -->
  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Foto da ocorrência"
       onclick="if(event.target===this||event.target.id==='lb-img-wrap')APP.closeLightbox()">
    <div id="lb-header">
      <div>
        <div id="lb-title"></div>
        <div id="lb-meta"></div>
      </div>
      <button id="lb-close" onclick="APP.closeLightbox()" aria-label="Fechar foto">✕</button>
    </div>
    <div id="lb-img-wrap">
      <img id="lb-img" src="" alt="Foto da ocorrência em tela cheia" />
    </div>
    <div id="lb-footer">
      <div id="lb-coords"></div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
